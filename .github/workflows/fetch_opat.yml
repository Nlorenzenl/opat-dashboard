name: Actualizar datos OPAT

on:
  schedule:
    # Cada 5 minutos, lunes a viernes, 7:00 a 20:00 hora Chile (UTC-4)
    # UTC 11:00-00:00 = Chile 07:00-20:00
    - cron: '*/5 11-23 * * 1-5'
    - cron: '*/5 0 * * 2-6'
  workflow_dispatch:  # permite ejecutarlo manualmente desde GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para hacer commit del data.json

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar script de fetch
        env:
          OPAT_USER: ${{ secrets.OPAT_USER }}
          OPAT_PASS: ${{ secrets.OPAT_PASS }}
          OPAT_URL:  ${{ secrets.OPAT_URL }}
        run: python scripts/fetch_opat.py

      - name: Commit y push de data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          # Solo hace commit si hay cambios reales
          git diff --staged --quiet || git commit -m "🔄 Actualizar datos OPAT $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
